<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <rect width="32" height="32" rx="4" fill="#1A56DB"/>
  <!-- 왼쪽 상단: 큰 흰색 사각형 -->
  <rect x="5" y="5" width="10" height="10" rx="1" fill="#FFFFFF"/>
  <!-- 오른쪽 상단: 연파랑 사각형 2개 -->
  <rect x="17" y="5" width="10" height="4.5" rx="1" fill="#8DAAF0"/>
  <rect x="17" y="10.5" width="10" height="4.5" rx="1" fill="#8DAAF0"/>
  <!-- 중간: 가로 긴 바 -->
  <rect x="5" y="17" width="22" height="4.5" rx="1" fill="#8DAAF0"/>
  <!-- 하단: 사각형 2개 -->
  <rect x="5" y="23" width="10" height="4.5" rx="1" fill="#8DAAF0"/>
  <rect x="17" y="23" width="10" height="4.5" rx="1" fill="#6B8FE0"/>
</svg>
